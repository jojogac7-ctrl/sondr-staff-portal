<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>Set New Password — sondr.STUDIO</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --blush:#ddb9ab;
      --blush-l:#C8ADAA;
      --blush-p:#F0DEDA;
      --cream:#F1F0EA;
      --parch:#F8F6F1;
      --white:#FDFDFA;
      --ink:#1C1312;
      --muted:#4A3430;
      --muted-l:#B5A291;
      --burgundy:#64333C;
      --ok:#4CAF82;
      --err:#C94040;
      --fd:'Playfair Display',serif;
      --fb:'DM Sans',sans-serif;
      --ease:cubic-bezier(0.22,1,0.36,1);
    }
    html{-webkit-font-smoothing:antialiased}
    body{
      font-family:var(--fb);font-weight:500;font-size:15.5px;line-height:1.6;
      background:var(--parch);color:var(--ink);
      min-height:100vh;display:flex;
      align-items:center;justify-content:center;
      padding:1.5rem;position:relative;overflow:hidden;
    }

    body::before{
      content:'';position:fixed;inset:0;
      background:
        radial-gradient(ellipse 65% 55% at 10% 15%, rgba(221,185,171,0.22) 0%, transparent 65%),
        radial-gradient(ellipse 55% 65% at 90% 85%, rgba(200,173,170,0.18) 0%, transparent 65%),
        radial-gradient(ellipse 45% 45% at 55% 45%, rgba(100,51,60,0.04) 0%, transparent 55%);
      pointer-events:none;
    }
    body::after{
      content:'sondr.';position:fixed;
      font-family:var(--fd);font-size:28vw;
      color:rgba(100,51,60,0.05);
      left:50%;top:50%;transform:translate(-50%,-50%);
      pointer-events:none;white-space:nowrap;user-select:none;
    }

    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── CARD ── */
    .card{
      background:rgba(253,253,250,0.92);
      border:1px solid rgba(100,51,60,0.11);
      box-shadow:
        0 2px 0 rgba(100,51,60,0.05),
        0 10px 52px rgba(100,51,60,0.09),
        0 2px 8px rgba(100,51,60,0.04);
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      padding:clamp(2.2rem,5vw,3.8rem);
      width:100%;max-width:420px;
      animation:fadeUp 0.7s var(--ease) both;
      position:relative;z-index:1;
    }
    .card::before{
      content:'';position:absolute;
      top:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,#ddb9ab 0%,#64333C 50%,#C8ADAA 100%);
    }

    /* ── LOGO ── */
    .logo{font-family:var(--fd);font-size:1.9rem;font-weight:400;color:var(--ink);line-height:1;letter-spacing:0.01em}
    .logo span{
      font-family:var(--fb);font-size:0.58rem;letter-spacing:0.24em;
      text-transform:uppercase;vertical-align:3px;margin-left:3px;
      color:var(--burgundy);font-weight:500;opacity:0.7;
    }
    .subtitle{
      font-size:0.58rem;letter-spacing:0.24em;text-transform:uppercase;
      color:var(--burgundy);margin:0.45rem 0 2.2rem;opacity:0.72;
    }

    /* ── FIELDS ── */
    .field{margin-bottom:1.3rem}
    .field label{
      display:block;font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;
      color:var(--muted);margin-bottom:0.5rem;font-weight:500;
    }
    .pw-wrap{position:relative}
    .field input{
      width:100%;padding:0.85rem 1rem;
      background:rgba(248,246,241,0.75);
      border:1px solid rgba(100,51,60,0.15);
      color:var(--ink);font-family:var(--fb);font-weight:400;font-size:0.92rem;
      outline:none;border-radius:0;
      transition:border-color 0.3s,box-shadow 0.3s,background 0.3s;
      -webkit-appearance:none;
    }
    .field input:focus{
      border-color:var(--burgundy);
      box-shadow:0 0 0 3px rgba(100,51,60,0.08);
      background:rgba(253,253,250,0.95);
    }
    .field input::placeholder{color:rgba(74,52,48,0.28)}
    .pw-wrap input{padding-right:3rem}
    .pw-toggle{
      position:absolute;right:0.85rem;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;
      color:rgba(74,52,48,0.28);transition:color 0.3s;
      padding:0.2rem;display:flex;align-items:center;
    }
    .pw-toggle:hover{color:var(--burgundy)}
    .pw-toggle svg{width:16px;height:16px;stroke:currentColor;fill:none}

    /* ── STRENGTH METER ── */
    .strength-wrap{margin-top:0.5rem}
    .strength{height:3px;background:rgba(100,51,60,0.1);overflow:hidden}
    .strength-fill{height:100%;transition:width 0.4s,background 0.4s;width:0}
    .strength-label{
      font-size:0.65rem;color:var(--muted-l);
      margin-top:0.3rem;display:block;
      min-height:1rem;
    }

    /* ── ALERTS ── */
    .alert{
      padding:0.8rem 1rem;font-size:0.8rem;
      margin-bottom:1.3rem;display:none;line-height:1.6;
    }
    .alert.err{
      background:rgba(201,64,64,0.07);
      border:1px solid rgba(201,64,64,0.18);
      border-left:3px solid var(--err);
      color:#7A1E1E;
    }
    .alert.ok{
      background:rgba(76,175,130,0.07);
      border:1px solid rgba(76,175,130,0.2);
      border-left:3px solid var(--ok);
      color:#1E5E3A;
    }

    /* ── BUTTON ── */
    .btn{
      width:100%;padding:0.92rem;
      background:var(--burgundy);color:var(--white);
      font-family:var(--fb);font-size:0.65rem;letter-spacing:0.22em;
      text-transform:uppercase;font-weight:500;border:none;cursor:pointer;
      transition:background 0.3s var(--ease),transform 0.15s;
      margin-top:0.4rem;
      display:flex;align-items:center;justify-content:center;gap:0.55rem;
    }
    .btn:hover:not(:disabled){background:#8B4A54}
    .btn:active:not(:disabled){transform:translateY(1px)}
    .btn:disabled{opacity:0.45;cursor:not-allowed}
    .spinner{
      width:14px;height:14px;
      border:2px solid rgba(253,253,250,0.25);
      border-top-color:var(--white);border-radius:50%;
      animation:spin 0.7s linear infinite;display:none;flex-shrink:0;
    }

    /* ── REQUIREMENTS LIST ── */
    .requirements{
      margin:0.8rem 0 1.4rem;
      padding:0.9rem 1rem;
      background:rgba(100,51,60,0.04);
      border:1px solid rgba(100,51,60,0.09);
    }
    .req-title{
      font-size:0.58rem;letter-spacing:0.16em;text-transform:uppercase;
      color:var(--muted);margin-bottom:0.5rem;font-weight:500;
    }
    .req-item{
      display:flex;align-items:center;gap:0.45rem;
      font-size:0.78rem;color:var(--muted);
      margin-bottom:0.3rem;line-height:1.4;
      transition:color 0.3s;
    }
    .req-item:last-child{margin-bottom:0}
    .req-dot{
      width:6px;height:6px;border-radius:50%;
      background:rgba(100,51,60,0.2);flex-shrink:0;
      transition:background 0.3s;
    }
    .req-item.met{color:var(--ok)}
    .req-item.met .req-dot{background:var(--ok)}

    @media(max-width:480px){.card{padding:2rem 1.4rem}}
  </style>
</head>
<body>

<div class="card">
  <div class="logo">sondr.<span>studio</span></div>
  <p class="subtitle">Set New Password</p>

  <div class="alert err" id="err"></div>
  <div class="alert ok"  id="ok"></div>

  <form id="form" autocomplete="off">
    <div class="field">
      <label>New Password</label>
      <div class="pw-wrap">
        <input type="password" id="pw1" placeholder="Min. 8 characters" required
               autocomplete="new-password" oninput="onPasswordInput(this.value)"/>
        <button type="button" class="pw-toggle" onclick="togglePw('pw1',this)" aria-label="Show password">
          <svg viewBox="0 0 24 24" stroke-width="1.5">
            <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
        </button>
      </div>

      <!-- Strength meter -->
      <div class="strength-wrap">
        <div class="strength"><div class="strength-fill" id="sfill"></div></div>
        <span class="strength-label" id="slabel"></span>
      </div>

      <!-- Requirements checklist -->
      <div class="requirements">
        <p class="req-title">Password must include</p>
        <div class="req-item" id="req-length"><span class="req-dot"></span>At least 8 characters</div>
        <div class="req-item" id="req-upper"><span class="req-dot"></span>One uppercase letter</div>
        <div class="req-item" id="req-number"><span class="req-dot"></span>One number</div>
      </div>
    </div>

    <div class="field">
      <label>Confirm Password</label>
      <div class="pw-wrap">
        <input type="password" id="pw2" placeholder="Repeat new password" required
               autocomplete="new-password"/>
        <button type="button" class="pw-toggle" onclick="togglePw('pw2',this)" aria-label="Show password">
          <svg viewBox="0 0 24 24" stroke-width="1.5">
            <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
        </button>
      </div>
    </div>

    <button type="submit" class="btn" id="btn">
      <span id="btxt">Update Password</span>
      <span class="spinner" id="bspin"></span>
    </button>
  </form>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPABASE_URL      = 'https://jzjftfdexvymdrdokjjo.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6amZ0ZmRleHZ5bWRyZG9rampvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MDg0MDgsImV4cCI6MjA5MTk4NDQwOH0.leOf1JeH0EX9TRlXT0ihCRUKoXuZW-b_CQrRX0cvefM';
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  const errEl = document.getElementById('err');
  const okEl  = document.getElementById('ok');
  errEl.style.display = 'none';
  okEl.style.display  = 'none';

  const p1 = document.getElementById('pw1').value;
  const p2 = document.getElementById('pw2').value;

  if (p1.length < 8) {
    errEl.textContent = 'Password must be at least 8 characters.';
    errEl.style.display = 'block'; return;
  }
  if (!/[A-Z]/.test(p1)) {
    errEl.textContent = 'Password must contain at least one uppercase letter.';
    errEl.style.display = 'block'; return;
  }
  if (!/[0-9]/.test(p1)) {
    errEl.textContent = 'Password must contain at least one number.';
    errEl.style.display = 'block'; return;
  }
  if (p1 !== p2) {
    errEl.textContent = 'Passwords do not match.';
    errEl.style.display = 'block'; return;
  }

  // Loading state
  document.getElementById('btn').disabled    = true;
  document.getElementById('btxt').style.display  = 'none';
  document.getElementById('bspin').style.display = 'inline-block';

  const { error } = await sb.auth.updateUser({ password: p1 });

  if (error) {
    errEl.textContent = error.message;
    errEl.style.display = 'block';
  } else {
    okEl.textContent = 'Password updated successfully! Redirecting to login…';
    okEl.style.display = 'block';
    setTimeout(() => window.location.href = '/staff/login.html', 2500);
  }

  document.getElementById('btn').disabled    = false;
  document.getElementById('btxt').style.display  = 'inline';
  document.getElementById('bspin').style.display = 'none';
});

// ── PASSWORD STRENGTH + REQUIREMENTS ─────────────────────────────
window.onPasswordInput = (pw) => {
  // Strength bar
  const fill  = document.getElementById('sfill');
  const label = document.getElementById('slabel');
  let score = 0;
  if (pw.length >= 8)  score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;

  const levels = [
    { w: '0%',   c: 'transparent', t: '' },
    { w: '25%',  c: '#C94040',     t: 'Weak' },
    { w: '50%',  c: '#E8A838',     t: 'Fair' },
    { w: '75%',  c: '#4CAF82',     t: 'Good' },
    { w: '100%', c: '#2D8A5E',     t: 'Strong' },
  ];
  const lvl = levels[Math.min(score, 4)];
  fill.style.width      = lvl.w;
  fill.style.background = lvl.c;
  label.textContent     = lvl.t;
  label.style.color     = lvl.c;

  // Requirements checklist
  const toggle = (id, met) => {
    const el = document.getElementById(id);
    el.classList.toggle('met', met);
  };
  toggle('req-length', pw.length >= 8);
  toggle('req-upper',  /[A-Z]/.test(pw));
  toggle('req-number', /[0-9]/.test(pw));
};

window.togglePw = (id, btn) => {
  const inp  = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.querySelector('svg').style.opacity = show ? '0.7' : '0.3';
};
</script>
</body>
</html>
